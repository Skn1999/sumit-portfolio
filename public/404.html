<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // Single-page app redirect for GitHub Pages.
      // When GitHub Pages serves a 404, this page encodes the original URL
      // into a query string and redirects to index.html, which then restores
      // the correct route via history.replaceState.
      // Based on https://github.com/rafgraph/spa-github-pages
      (function () {
        var pathSegmentsToKeep = 0; // 0 for username.github.io, 1 for project sites (/repo-name/)
        var repo = location.pathname.split("/")[1]; // e.g. "sumit-portfolio"
        // Detect if we're on a project-site (path starts with /repo-name/)
        // If your site is at username.github.io (no subpath), set pathSegmentsToKeep = 0
        // If at username.github.io/repo-name/, set pathSegmentsToKeep = 1
        pathSegmentsToKeep = 1;

        var l = location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body>
    Redirecting&hellip;
  </body>
</html>
